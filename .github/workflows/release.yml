name: Release

# Tag-driven release: builds the single-file bundle and publishes it as a
# GitHub Release. The release assets are what the Skaile `ai-assets/mcp/sql`
# catalog entry consumes as an `upstream_pointer`:
#   - server.js     — the bundled MCP server (run by the baseline `node`)
#   - manifest.json  — { file, sha256, version } for integrity-pinned install
#
# Normal path: merging the changesets "Version Packages" PR makes version.yml
# tag the merge commit `v<version>` and dispatch this workflow at that tag
# (workflow_dispatch, because GITHUB_TOKEN tag pushes can't trigger workflows).
# Escape hatch: a manually pushed `v*` tag triggers it directly.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # dispatched by version.yml at the release tag ref

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    name: Build & publish release artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Build single-file bundle
        run: bun run build # produces dist/server.js

      - name: Generate integrity manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum dist/server.js | awk '{print $1}')
          cat > dist/manifest.json <<EOF
          {
            "file": "server.js",
            "sha256": "${SHA256}",
            "version": "${VERSION}"
          }
          EOF
          cat dist/manifest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/server.js dist/manifest.json \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
