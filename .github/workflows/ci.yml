name: CI

# Path-scoped to source: a docs-only PR (e.g. the design spec) does not trigger
# this, so it stays green. Activates once the implementation lands (src/,
# package.json, etc.). Requires the matching scripts in package.json:
#   - bun run typecheck
#   - bun run test
#   - bun run build
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"

jobs:
  build-test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build bundle
        run: bun run build
