name: Version & Release

# On push to main:
#   1. changesets/action opens/updates the "Version Packages" PR when
#      unreleased changesets exist (running `bun run version` to bump
#      package.json and regenerate CHANGELOG.md).
#   2. When the Version PR merges, the package.json version changes in this
#      push, so the release-trigger steps tag the merge commit `v<version>`
#      and dispatch release.yml at that tag, which builds the bundle and
#      publishes the GitHub Release. Nothing is published to npm.
#
# The dispatch is explicit because tags pushed with the default GITHUB_TOKEN
# intentionally do not trigger other workflows (GitHub's recursion guard), so
# the tag push alone would never fire release.yml. Manual `git tag v* && git
# push` from a developer still triggers release.yml directly.
#
# Adapted from platform/.github/workflows/version.yml, with the deploy-branch
# trigger replaced by tag + release dispatch (this repo ships a GitHub Release
# artifact instead of deploying a service).
on:
  push:
    branches: [main]

# Never run two versioning runs concurrently, and never cancel an in-flight one.
concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the version commit + the release tag
  pull-requests: write # open/update the "Version Packages" PR
  actions: write # dispatch release.yml at the new tag

jobs:
  version:
    name: Version & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      # Opens/updates the "Version Packages" PR when changesets exist; no-op
      # otherwise. No `publish` input: this package is private and never
      # published to npm.
      - name: Create Version PR
        # Pinned to a full commit SHA: this step runs with contents: write +
        # pull-requests: write, so a hijacked moving tag would be high-impact.
        # Bump the SHA + comment together when upgrading.
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run version
          title: "chore: version sql-mcp"
          commit: "chore: version sql-mcp"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The only push to main that changes the package.json version is the
      # Version-PR merge, so this detects "a release just landed".
      #
      # Inspect the pushed commit by its SHA, NOT the working-tree HEAD: when
      # changesets exist, the action above leaves the checkout on its local
      # `changeset-release/main` branch with the bump already committed, so
      # `git diff HEAD~1 HEAD` would report a version bump on EVERY push.
      # `$GITHUB_SHA` is the real main tip regardless of the working tree.
      #
      # Compare the PARSED top-level version, not the diff text: grepping the
      # diff for an added `"version":` line false-positives on any other line
      # matching that key — e.g. the `"version": "changeset version"` script
      # entry tripped it when this workflow itself landed (#11).
      - name: Detect version bump
        id: bump
        run: |
          OLD=$(git show "${GITHUB_SHA}~1:package.json" | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          NEW=$(git show "${GITHUB_SHA}:package.json" | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "Release detected: $OLD -> $NEW"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change in this push (still $NEW)"
          fi

      # Tag the merge commit and dispatch release.yml at that tag. The
      # ls-remote guard makes workflow re-runs idempotent: an existing tag
      # means this release was already triggered.
      - name: Tag & trigger release
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.bump.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — skipping (already released)"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"
          gh workflow run release.yml --ref "${TAG}"
